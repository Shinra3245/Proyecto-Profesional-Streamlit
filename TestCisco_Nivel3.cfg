! Prueba de Errores Semánticos (Nivel 3) para Cisco
configure terminal
hostname RouterTest
!
! 1. Error: Subinterfaces multiples marcadas como nativas
interface GigabitEthernet0/0.10
encapsulation dot1Q 10 native
interface GigabitEthernet0/0.20
encapsulation dot1Q 20 native
!
! 2. Error: IPs duplicadas en distintas interfaces
interface GigabitEthernet0/1
ip address 192.168.1.1 255.255.255.0
interface GigabitEthernet0/2
ip address 192.168.1.1 255.255.255.0
!
! 3. Error: Uso de VLANs que nunca se crearon globalmente
interface GigabitEthernet0/3
switchport mode trunk
switchport trunk allowed vlan 50,60
interface GigabitEthernet0/4
switchport mode access
switchport access vlan 99
!
! 4. Error: Uso de lista de acceso no declarada
interface GigabitEthernet0/5
ip access-group 150 in
!
